<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>📋 servicios en general tareas</title>

<style>

/* ================= RESET ================= */
*{
  box-sizing:border-box;
}

/* ================= BODY ================= */
body{
  font-family:Arial,sans-serif;
  margin:0;
  min-height:100vh;
  background:linear-gradient(135deg,#1e1e2f,#007BFF);
  color:#333;
  padding:20px;
}

/* ================= TOP BAR ================= */
.top-bar{
  display:flex;
  justify-content:flex-start;
  margin-bottom:20px;
}

/* ================= BOTONES ================= */
button{
  padding:10px 14px;
  margin:3px;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:10px;
  transition:0.3s;
  font-weight:bold;
}

button:hover{
  transform:scale(1.05);
}

.btn-inicio{
  background:linear-gradient(to right,#28a745,#20c997);
}

.btn-hecho{
  background:linear-gradient(to right,#007BFF,#0dcaf0);
}

.btn-eliminar{
  background:linear-gradient(to right,#dc3545,#ff6b6b);
}

.btn-guardar{
  background:linear-gradient(to right,#007BFF,#0dcaf0);
}

.btn-ver{
  background:linear-gradient(to right,#17a2b8,#0dcaf0);
}

/* ================= CONTENEDOR ================= */
.container{
  width:95%;
  max-width:1200px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* ================= TITULO ================= */
h2{
  margin-top:0;
  margin-bottom:25px;
  color:#1e1e2f;
  text-align:center;
  font-size:30px;
}

/* ================= FORM ================= */
.form{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:12px;
  margin-bottom:25px;
}

input{
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  width:220px;
  font-size:14px;
  outline:none;
}

input:focus{
  border-color:#007BFF;
  box-shadow:0 0 10px rgba(0,123,255,0.3);
}

/* ================= TABLA ================= */
table{
  width:100%;
  border-collapse:collapse;
  overflow:hidden;
  border-radius:15px;
}

th{
  background:linear-gradient(to right,#007BFF,#0dcaf0);
  color:white;
  padding:14px;
  font-size:15px;
}

td{
  padding:12px;
  border-bottom:1px solid #eee;
  text-align:center;
}

tr:hover{
  background:#f8fbff;
}

/* ================= DESCRIPCION ================= */
.descripcion{
  max-width:200px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* ================= ESTADOS ================= */
.pendiente{
  color:#ff9800;
  font-weight:bold;
}

.hecho{
  color:#28a745;
  font-weight:bold;
}

/* ================= RESPONSIVE ================= */
@media(max-width:768px){

  .container{
    padding:20px;
  }

  .form{
    flex-direction:column;
    align-items:center;
  }

  input{
    width:100%;
  }

  table{
    font-size:13px;
  }

  td,th{
    padding:8px;
  }
}

</style>
</head>

<body>

<div class="top-bar">
  <button class="btn-inicio" onclick="irInicio()">🏠 Inicio</button>
</div>

<div class="container">

  <h2>📋 Gestión de Tareas</h2>

  <div class="form">
    <input id="descripcion" placeholder="Descripción de la tarea">
    <input id="asignado_por" placeholder="Asignado por">
    <input type="date" id="fecha">

    <button class="btn-guardar" onclick="guardar()">
      💾 Guardar
    </button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Tarea</th>
        <th>Asignado por</th>
        <th>Fecha</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody id="tabla"></tbody>
  </table>

</div>

<script>

const API = window.location.origin;

function irInicio(){
  window.location.href = "/";
}

function verTarea(texto){
  alert("📋 Tarea:\n\n" + decodeURIComponent(texto));
}

// 🔥 GUARDAR
async function guardar(){

  const descripcion =
    document.getElementById("descripcion").value;

  const asignado_por =
    document.getElementById("asignado_por").value;

  const fecha =
    document.getElementById("fecha").value;

  if(!descripcion || !asignado_por || !fecha){
    alert("Completa todos los datos");
    return;
  }

  await fetch(`${API}/tareas`,{
    method:'POST',
    headers:{
      'Content-Type':'application/json'
    },
    body:JSON.stringify({
      descripcion,
      asignado_por,
      fecha
    })
  });

  limpiar();
  cargar();
}

// 🔥 COMPLETAR
async function completar(id){

  const nombre =
    prompt("¿Quién completó la tarea?");

  if(!nombre) return;

  await fetch(`${API}/tareas/` + id,{
    method:'PUT',
    headers:{
      'Content-Type':'application/json'
    },
    body:JSON.stringify({
      realizado_por:nombre
    })
  });

  cargar();
}

// 🔥 ELIMINAR
async function eliminar(id){

  if(!confirm("¿Eliminar tarea?")) return;

  await fetch(`${API}/tareas/` + id,{
    method:'DELETE'
  });

  cargar();
}

// 🔥 LIMPIAR
function limpiar(){

  document.getElementById("descripcion").value = "";
  document.getElementById("asignado_por").value = "";
  document.getElementById("fecha").value = "";
}

// 🔥 CARGAR
async function cargar(){

  const res =
    await fetch(`${API}/tareas`);

  const data =
    await res.json();

  let html = '';

  if(data.length === 0){

    html = `
      <tr>
        <td colspan="5">
          No hay tareas
        </td>
      </tr>
    `;
  }

  data.forEach(t => {

    html += `
      <tr>

        <td class="descripcion">

          ${t.descripcion.length > 20
            ? t.descripcion.substring(0,20) + '...'
            : t.descripcion}

          <br>

          <button class="btn-ver"
            onclick="verTarea('${encodeURIComponent(t.descripcion)}')">
            👁
          </button>

        </td>

        <td>
          ${t.asignado_por || ''}
        </td>

        <td>
          ${t.fecha.split('T')[0]}
        </td>

        <td class="${t.estado}">

          ${t.estado}

          ${t.realizado_por
            ? `<br><small>👤 ${t.realizado_por}</small>`
            : ''}

        </td>

        <td>

          ${t.estado === 'pendiente'
            ? `<button class="btn-hecho"
                onclick="completar(${t.id})">
                ✔
              </button>`
            : ''}

          <button class="btn-eliminar"
            onclick="eliminar(${t.id})">
            ❌
          </button>

        </td>

      </tr>
    `;
  });

  document.getElementById("tabla").innerHTML = html;
}

cargar();

</script>

</body>
</html>
