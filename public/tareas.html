<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>📋 servicios en general tareas</title>

<style>

/* ================= RESET ================= */
*{
  box-sizing:border-box;
}
/* ================= RESET ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* ================= BODY ================= */
body{
  font-family:Arial,sans-serif;
  min-height:100vh;
  background:
  radial-gradient(circle at top,#00ff6644,#000000 60%),
  linear-gradient(135deg,#050505,#0d5f2a,#000000);
  color:white;
  padding:20px;
  padding-bottom:40px;
}

/* ================= EFECTOS ================= */
body::before{
  content:"";
  position:fixed;
  width:500px;
  height:500px;
  background:#00ff66;
  filter:blur(180px);
  opacity:0.1;
  top:-150px;
  left:-150px;
  z-index:-1;
}

body::after{
  content:"";
  position:fixed;
  width:400px;
  height:400px;
  background:#7cff00;
  filter:blur(160px);
  opacity:0.08;
  bottom:-120px;
  right:-120px;
  z-index:-1;
}

/* ================= TOP BAR ================= */
.top-bar{
  display:flex;
  justify-content:flex-start;
  margin-bottom:20px;
}

/* ================= BOTONES ================= */
button{
  padding:12px 16px;
  margin:3px;
  border:none;
  color:black;
  cursor:pointer;
  border-radius:12px;
  transition:0.3s;
  font-weight:bold;
  box-shadow:0 0 15px #00ff6644;
}

button:hover{
  transform:scale(1.05);
  box-shadow:
  0 0 20px #00ff66,
  0 0 40px #00ff6666;
}

.btn-inicio{
  background:linear-gradient(45deg,#00ff66,#7cff00);
}

.btn-hecho{
  background:linear-gradient(45deg,#00ff66,#7cff00);
}

.btn-eliminar{
  background:linear-gradient(45deg,#263238,#37474f);
  color:white;
  border:1px solid #00ff66;
}
.btn-guardar{
  background:linear-gradient(45deg,#00ff66,#7cff00);
}

.btn-ver{
  background:linear-gradient(45deg,#00c853,#64dd17);
  color:black;
}

/* ================= CONTENEDOR ================= */
.container{
  width:95%;
  max-width:1200px;
  margin:auto;
  background:rgba(15,15,15,0.92);
  padding:30px;
  border-radius:22px;
  border:1px solid #00ff66;
  box-shadow:
  0 0 25px #00ff6633;
  backdrop-filter:blur(8px);
}

/* ================= TITULO ================= */
h2{
  margin-top:0;
  margin-bottom:25px;
  color:#00ff66;
  text-align:center;
  font-size:32px;
  text-shadow:0 0 12px #00ff66;
}

/* ================= FORM ================= */
.form{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:12px;
  margin-bottom:25px;
}

/* ================= INPUTS ================= */
input{
  padding:12px;
  border-radius:12px;
  border:1px solid #00ff66;
  background:#111;
  color:white;
  width:220px;
  font-size:14px;
  outline:none;
  transition:0.3s;
}

input::placeholder{
  color:#aaa;
}

/* 🔥 FECHA */
input[type="date"]{
  color:white;
}

input[type="date"]::-webkit-calendar-picker-indicator{
  filter:invert(1);
  cursor:pointer;
}



/* ================= TABLA ================= */
table{
  width:100%;
  border-collapse:collapse;
  overflow:hidden;
  border-radius:18px;
  background:rgba(10,10,10,0.95);
  box-shadow:
  0 0 20px #00ff6622;
}

th{
  background:linear-gradient(45deg,#00ff66,#0d5f2a);
  color:black;
  padding:14px;
  font-size:15px;
}

td{
  padding:12px;
  border-bottom:1px solid #222;
  text-align:center;
  color:#eee;
}

tr:hover{
  background:#111;
}

/* ================= DESCRIPCION ================= */
.descripcion{
  max-width:220px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* ================= ESTADOS ================= */
.pendiente{
  color:#ffae00;
  font-weight:bold;
}

.hecho{
  color:#00ff66;
  font-weight:bold;
  text-shadow:0 0 10px #00ff66;
}

/* ================= RESPONSIVE ================= */
@media(max-width:768px){

  .container{
    padding:20px;
  }

  .form{
    flex-direction:column;
    align-items:center;
  }

  input{
    width:100%;
  }

  table{
    font-size:13px;
  }

  td,th{
    padding:8px;
  }

}

</style>
</head>

<body>

<div class="top-bar">
  <button class="btn-inicio" onclick="irInicio()">🏠 Inicio</button>
</div>

<div class="container">

  <h2>📋 Gestión de Tareas en la institucion </h2>

  <div class="form">
    <input id="descripcion" placeholder="Descripción de la tarea">
    <input id="asignado_por" placeholder="Asignado por">
    <input type="date" id="fecha">
    <input type="file"
id="imagenes"
accept="image/*"
multiple>


    <button class="btn-guardar" onclick="guardar()">
      💾 Guardar
    </button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Tarea</th>
        <th>Asignado por</th>
        <th>Fecha</th>
        <th>Estado</th>
        <th>Acciones</th>
        <th>Imágenes</th>
      </tr>
    </thead>

    <tbody id="tabla"></tbody>
  </table>

</div>

<script>
  


const API = window.location.origin;

function irInicio(){
  window.location.href = "/";
}

function verTarea(texto){
  alert("📋 Tarea:\n\n" + decodeURIComponent(texto));
}

async function guardar(){

  const descripcion =
    document.getElementById("descripcion").value;

  const asignado_por =
    document.getElementById("asignado_por").value;

  const fecha =
    document.getElementById("fecha").value;

  const archivos =
    document.getElementById("imagenes").files;

  let imagenes = [];

  if(!descripcion || !asignado_por || !fecha){
    alert("Completa todos los datos");
    return;
  }

  // 🔥 SUBIR IMÁGENES A CLOUDINARY
  for(let archivo of archivos){

    const formData = new FormData();

    formData.append('file', archivo);

    formData.append(
      'upload_preset',
      'institucion'
    );

    const cloudRes =
      await fetch(
        'https://api.cloudinary.com/v1_1/dcyxqnkyv/image/upload',
        {
          method:'POST',
          body:formData
        }
      );

    const cloudData =
      await cloudRes.json();

    imagenes.push(
      cloudData.secure_url
    );
  }

  // 🔥 GUARDAR EN API
  await fetch(`${API}/tareas`,{
    method:'POST',
    headers:{
      'Content-Type':'application/json'
    },
    body:JSON.stringify({
      descripcion,
      asignado_por,
      fecha,
      imagenes
    })
  });

  limpiar();

  cargar();
}

// 🔥 COMPLETAR
async function completar(id){

  const nombre =
    prompt("¿Quién completó la tarea?");

  if(!nombre) return;

  const archivos =
  document.getElementById(`evidencia_${id}`).files;

  let evidencia_final = [];

  // 🔥 SUBIR IMÁGENES
  for(let archivo of archivos){

    const formData = new FormData();

    formData.append('file', archivo);

    formData.append(
      'upload_preset',
      'institucion'
    );

    const cloudRes =
      await fetch(
        'https://api.cloudinary.com/v1_1/dcyxqnkyv/image/upload',
        {
          method:'POST',
          body:formData
        }
      );

    const cloudData =
      await cloudRes.json();

    evidencia_final.push(
      cloudData.secure_url
    );
  }

  // 🔥 ACTUALIZAR
  await fetch(`${API}/tareas/` + id,{

    method:'PUT',

    headers:{
      'Content-Type':'application/json'
    },

    body:JSON.stringify({

      realizado_por:nombre,
      evidencia_final

    })
  });

  cargar();
}

// 🔥 ELIMINAR
async function eliminar(id){

  if(!confirm("¿Eliminar tarea?")) return;

  await fetch(`${API}/tareas/` + id,{
    method:'DELETE'
  });

  cargar();
}

// 🔥 LIMPIAR
function limpiar(){

  document.getElementById("descripcion").value = "";
  document.getElementById("asignado_por").value = "";
  document.getElementById("fecha").value = "";
}

// 🔥 CARGAR
async function cargar(){

  const res =
    await fetch(`${API}/tareas`);

  const data =
    await res.json();

  let html = '';

  if(data.length === 0){

    html = `
      <tr>
        <td colspan="5">
          No hay tareas
        </td>
      </tr>
    `;
  }

  data.forEach(t => {

    html += `
      <tr>

        <td class="descripcion">

          ${t.descripcion.length > 20
            ? t.descripcion.substring(0,20) + '...'
            : t.descripcion}

          <br>

          <button class="btn-ver"
            onclick="verTarea('${encodeURIComponent(t.descripcion)}')">
            👁
          </button>

        </td>

        <td>
          ${t.asignado_por || ''}
        </td>

        <td>
          ${t.fecha.split('T')[0]}
        </td>

        <td class="${t.estado}">

          ${t.estado}

          ${t.realizado_por
            ? `<br><small>👤 ${t.realizado_por}</small>`
            : ''}

        </td>

        <td>

         ${t.estado === 'pendiente'
  ? `
  <input
    type="file"
    id="evidencia_${t.id}"
    accept="image/*"
    multiple
    style="width:150px;font-size:11px;margin-bottom:5px;"
  >

  <button class="btn-hecho"
    onclick="completar(${t.id})">
    ✔
  </button>
  `
  : ''}

        </td>

        
        <td>

  ${
    t.imagenes?.length
    ? `
      <button class="btn-ver"
        onclick="window.open('${t.imagenes[0]}')">
        📷 Inicial
      </button>
    `
    : ''
  }

  <br>

${
  t.evidencia_final?.length
  ? t.evidencia_final.map(img => `
      <button class="btn-ver"
        onclick="window.open('${img}')">
        ✅ Ver
      </button>
    `).join('')
  : 'Sin evidencia'
}

</td>

      </tr>
    `;
  });

  document.getElementById("tabla").innerHTML = html;
}

cargar();

</script>

</body>
</html>
