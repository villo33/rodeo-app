<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#00ff66">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>CASA NOA - PANEL PRINCIPAL</title>

<link rel="icon" href="/logo.png">

<style>

/* ================= RESET ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* ================= BODY ================= */
body{
    min-height:100vh;
    font-family:Arial, sans-serif;
    background:
    radial-gradient(circle at top,#00ff6644,#000000 60%),
    linear-gradient(135deg,#050505,#0d5f2a,#000000);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow:hidden;
}

/* ================= EFECTO FONDO ================= */
body::before{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background:#00ff66;
    filter:blur(180px);
    opacity:0.15;
    top:-150px;
    left:-150px;
    z-index:-1;
}

body::after{
    content:"";
    position:fixed;
    width:400px;
    height:400px;
    background:#7cff00;
    filter:blur(160px);
    opacity:0.1;
    bottom:-120px;
    right:-120px;
    z-index:-1;
}

/* ================= CONTENEDOR ================= */
.container{
    width:420px;
    max-width:100%;
    background:rgba(15,15,15,0.92);
    border:1px solid #00ff66;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:
    0 0 20px #00ff6655,
    0 0 50px #00ff6622;
    backdrop-filter:blur(10px);
}

/* ================= TITULO ================= */
h1{
    margin-bottom:30px;
    color:#00ff66;
    font-size:32px;
    text-shadow:0 0 15px #00ff66;
}

/* ================= MENU ================= */
.menu{
    display:flex;
    flex-direction:column;
    gap:18px;
}

/* ================= LINKS ================= */
.menu a{
    padding:16px;
    border-radius:15px;
    text-decoration:none;
    color:white;
    font-weight:bold;
    background:linear-gradient(
        45deg,
        #00ff66,
        #7cff00
    );
    transition:0.3s;
    font-size:16px;
    box-shadow:0 0 15px #00ff6655;
}

.menu a:hover{
    transform:scale(1.04);
    box-shadow:
    0 0 20px #00ff66,
    0 0 40px #00ff6677;
}

/* ================= BOTONES ================= */
button{
    margin-top:20px;
    padding:14px;
    width:100%;
    border:none;
    border-radius:15px;
    background:linear-gradient(
        45deg,
        #00ff66,
        #0d5f2a
    );
    color:black;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 0 15px #00ff6655;
}

button:hover{
    transform:scale(1.03);
    box-shadow:
    0 0 20px #00ff66,
    0 0 40px #00ff6677;
}

/* ================= FOOTER ================= */
.footer{
    margin-top:25px;
    font-size:13px;
    color:#aaaaaa;
}

/* ================= INSTALAR APP ================= */
#btnInstalar{
    display:none;
    position:fixed;
    bottom:20px;
    right:20px;
    width:auto;
    padding:14px 20px;
    background:linear-gradient(
        45deg,
        #00ff66,
        #7cff00
    );
    color:black;
    font-weight:bold;
    border:none;
    border-radius:15px;
    z-index:999;
    box-shadow:0 0 20px #00ff66;
}

/* ================= RESPONSIVE ================= */
@media(max-width:480px){

    .container{
        padding:30px 20px;
    }

    h1{
        font-size:26px;
    }

    .menu a,
    button{
        font-size:14px;
    }
}

</style>
</head>

<body>

<div class="container">

    <h1>🏨 CASA NOA</h1>

    <div class="menu">

        <a href="/mantenimiento.html">
            🛠️ Mantenimiento
        </a>

        <a href="/tareas.html">
            📋 Tareas
        </a>

    </div>

    <button onclick="activarNotificaciones()">
        🔔 Activar notificaciones
    </button>

    <div class="footer">
        Creado por Ovidio Camaño
    </div>

</div>

<!-- ================= BOTON INSTALAR ================= -->
<button id="btnInstalar">
📲 Instalar App
</button>

<script>

/* ================= SERVICE WORKER ================= */
if ("serviceWorker" in navigator) {

    navigator.serviceWorker
    .register("/service-worker.js")
    .then(()=>{
        console.log("✅ Service Worker registrado");
    })
    .catch((error)=>{
        console.log("❌ Error SW:", error);
    });
}

/* ================= PUBLIC KEY ================= */
const PUBLIC_KEY =
'BJ9e4DSpEVY0_Nq_FJ6py3oGRBKFl7BCh5wunz4q5bDjA87IaJP2vw902IOj4rNllyV0B8ddg52vwrA5gXq0DSw';

/* ================= CONVERTIDOR ================= */
function urlBase64ToUint8Array(base64String){

    const padding =
    '='.repeat((4 - base64String.length % 4) % 4);

    const base64 =
    (base64String + padding)
    .replace(/-/g, '+')
    .replace(/_/g, '/');

    const rawData = atob(base64);

    return new Uint8Array(
        [...rawData].map(char =>
        char.charCodeAt(0))
    );
}

/* ================= ACTIVAR NOTIFICACIONES ================= */
async function activarNotificaciones(){

    try{

        const permiso =
        await Notification.requestPermission();

        if(permiso !== "granted"){

            alert("❌ Debes permitir notificaciones");
            return;
        }

        const registro =
        await navigator.serviceWorker.ready;

        let suscripcion =
        await registro.pushManager.getSubscription();

        if(suscripcion){

            await suscripcion.unsubscribe();
        }

        suscripcion =
        await registro.pushManager.subscribe({

            userVisibleOnly:true,

            applicationServerKey:
            urlBase64ToUint8Array(PUBLIC_KEY)
        });

        await fetch("/suscribir",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify(suscripcion)
        });

        alert("✅ Notificaciones activadas");

    }catch(error){

        console.log(error);

        alert("❌ Error activando notificaciones");
    }
}

/* ================= INSTALAR APP ================= */
let deferredPrompt;

const btn =
document.getElementById("btnInstalar");

window.addEventListener(
    "beforeinstallprompt",
    (e)=>{

    e.preventDefault();

    deferredPrompt = e;

    btn.style.display = "block";
});

btn.addEventListener("click", async ()=>{

    if(!deferredPrompt) return;

    deferredPrompt.prompt();

    await deferredPrompt.userChoice;

    deferredPrompt = null;

    btn.style.display = "none";
});

window.addEventListener(
    "appinstalled",
    ()=>{

    btn.style.display = "none";

    deferredPrompt = null;

    console.log("✅ App instalada");
});

</script>

</body>
</html>
