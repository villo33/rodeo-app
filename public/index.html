<script>

/* ================= SERVICE WORKER ================= */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js");
}

/* ================= PUBLIC KEY ================= */
const PUBLIC_KEY = 'BJ9e4DSpEVY0_Nq_FJ6py3oGRBKFl7BCh5wunz4q5bDjA87IaJP2vw902IOj4rNllyV0B8ddg52vwrA5gXq0DSw';

/* ================= CONVERTIDOR ================= */
function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding)
    .replace(/-/g, '+')
    .replace(/_/g, '/');

  const rawData = atob(base64);
  return new Uint8Array([...rawData].map(char => char.charCodeAt(0)));
}
/* ================= PWA INSTALL EVENT ================= */


/* ================= ACTIVAR NOTIFICACIONES ================= */
async function activarNotificaciones() {

  const permiso = await Notification.requestPermission();

  if (permiso !== "granted") {
    alert("Debes permitir notificaciones");
    return;
  }

  const registro = await navigator.serviceWorker.ready;

  // 🔥 BORRAR SUSCRIPCIÓN VIEJA (CLAVE)
  let suscripcion = await registro.pushManager.getSubscription();

  if (suscripcion) {
    await suscripcion.unsubscribe();
  }

  // 🔥 CREAR NUEVA LIMPIA
  suscripcion = await registro.pushManager.subscribe({
    userVisibleOnly: true,
    applicationServerKey: urlBase64ToUint8Array(PUBLIC_KEY)
  });

  console.log("SUSCRIPCIÓN NUEVA:", suscripcion);

  await fetch("/suscribir", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(suscripcion)
  });

  alert("🔔 Notificaciones activadas correctamente");
}
</script>
<!-- 🔥 BOTÓN -->
<button id="btnInstalar" style="display:none; position:fixed; bottom:20px; right:20px; padding:12px 16px; border-radius:10px; background:#007BFF; color:white; border:none;">
📲 Instalar App
</button>

<!-- 🔥 SCRIPT DE INSTALACIÓN -->
<script>

let deferredPrompt;
const btn = document.getElementById("btnInstalar");

// 🔥 EVENTO PRINCIPAL
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;

  btn.style.display = "block";
});

// 🔥 CLICK INSTALAR
btn.addEventListener("click", async () => {
  if (!deferredPrompt) return;

  deferredPrompt.prompt();

  const result = await deferredPrompt.userChoice;

  if (result.outcome === "accepted") {
    console.log("Instalada");
  }

  deferredPrompt = null;
  btn.style.display = "none";
});

// 🔥 CUANDO YA ESTA INSTALADA
window.addEventListener("appinstalled", () => {
  console.log("App instalada correctamente");
  btn.style.display = "none";
  deferredPrompt = null;
});

</script>
</body>
