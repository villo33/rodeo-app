<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🛠️ Mantenimiento</title>

<style>
.btn-guardar {
  background: #007BFF;
}

.btn-guardar:hover {
  background: #0056b3;
}
body {
  font-family: Arial;
  background: #f4f6f9;
  margin: 0;
  text-align: center;
}

/* 🔹 HEADER */
.header {
  background: #1e1e2f;
  color: white;
  padding: 15px;
  font-size: 20px;
}

/* 🔹 TOP BAR */
.top-bar {
  display: flex;
  justify-content: space-between;
  padding: 10px 20px;
}

.btn-inicio {
  background: #28a745;
}

.btn-logout {
  background: red;
}

button {
  padding: 8px 15px;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 6px;
}

input, select {
  padding: 8px;
  margin: 5px;
  width: 150px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* 🔹 FORM */
.form {
  margin: 15px;
}

/* 🔹 TABLA */
table {
  margin: auto;
  margin-top: 20px;
  border-collapse: collapse;
  width: 90%;
  background: white;
}

th {
  background: #007BFF;
  color: white;
  padding: 10px;
}

td {
  padding: 8px;
  border: 1px solid #ccc;
}

.descripcion {
  max-width: 200px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.btn-editar {
  background: orange;
}

.btn-eliminar {
  background: red;
}

</style>
</head>

<body>

<div class="header">
🛠️ Mantenimiento CASA NOA
</div>

<div class="top-bar">
  <button class="btn-inicio" onclick="irInicio()">🏠 Inicio</button>
  <button class="btn-logout" onclick="logout()">🚪 Cerrar sesión</button>
</div>

<script>

// 🔥 API DINÁMICA (IMPORTANTE)
const API = window.location.origin;

// 🔥 NAVEGACIÓN CORREGIDA
function irInicio() {
  window.location.href = "/";
}

function logout() {
  localStorage.removeItem('logueado');
  window.location.href = '/';
}

</script>

<div class="form">
  <select id="habitacion">
    <option value="">Habitación</option>
  </select>

  <input type="text" id="descripcion" placeholder="Descripción">
  <input type="text" id="encargado" placeholder="Encargado">
  <input type="date" id="fecha">

  <button class="btn-guardar" onclick="guardar()">💾 Guardar</button>
</div>

<table>
  <thead>
    <tr>
      <th>Habitación</th>
      <th>Descripción</th>
      <th>Encargado</th>
      <th>Fecha</th>
      <th>Acciones</th>
    </tr>
  </thead>

  <tbody id="tabla"></tbody>
</table>

<script>

let editandoId = null;

// 🔹 FORMATO FECHA
function formatearFecha(fecha) {
  return new Date(fecha).toLocaleDateString();
}

// 🔹 HABITACIONES
function cargarHabitaciones() {
  const select = document.getElementById("habitacion");

  const habitaciones = [
    101,102,103,104,105,106,107,
    201,202,203,204,205,206,207,
    301,302,303,304,305,306
  ];

  habitaciones.forEach(h => {
    const option = document.createElement("option");
    option.value = h;
    option.textContent = h;
    select.appendChild(option);
  });
}

// 🔹 CARGAR
async function cargar() {
  try {

    const res = await fetch(`${API}/mantenimiento`);
    const data = await res.json();

    data.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

    const tabla = document.getElementById('tabla');
    tabla.innerHTML = '';

    if (data.length === 0) {
      tabla.innerHTML = `<tr><td colspan="6">Sin datos</td></tr>`;
      return;
    }

    data.forEach(item => {

      // 🔥 EVITA ERRORES CON COMILLAS
      const desc = (item.descripcion || '').replace(/'/g, "\\'");
      const encargado = (item.encargado || '').replace(/'/g, "\\'");

      const fila = document.createElement('tr');

      fila.innerHTML = `
        <td>${item.habitacion}</td>
        <td class="descripcion" title="${item.descripcion}">
          ${item.descripcion}
        </td>
        <td>${item.encargado}</td>
        <td>${formatearFecha(item.fecha)}</td>
        <td>
          <button class="btn-editar"
            onclick="editar(${item.id}, '${item.habitacion}', '${desc}', '${encargado}', '${item.fecha}')">
            ✏️
          </button>
          <button class="btn-eliminar" onclick="eliminar(${item.id})">
            ❌
          </button>
        </td>
      `;

      tabla.appendChild(fila);
    });

  } catch (error) {
    alert("Error cargando datos ❌");
    console.log(error);
  }
}

// 🔹 GUARDAR
async function guardar() {

  const habitacion = document.getElementById('habitacion').value;
  const descripcion = document.getElementById('descripcion').value;
  const encargado = document.getElementById('encargado').value;
  const fecha = document.getElementById('fecha').value;

  if (!habitacion || !descripcion || !encargado || !fecha) {
    alert("Completa todos los campos");
    return;
  }

  try {

    await fetch(`${API}/mantenimiento`, {
      method: editandoId ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        id: editandoId,
        habitacion,
        descripcion,
        encargado,
        fecha
      })
    });

    limpiar();
    cargar();

  } catch (error) {
    alert("Error guardando ❌");
  }
}

// 🔹 EDITAR (MEJORADO)
function editar(id, habitacion, descripcion, encargado, fecha) {

  document.getElementById('habitacion').value = habitacion;
  document.getElementById('descripcion').value = descripcion;
  document.getElementById('encargado').value = encargado;
  document.getElementById('fecha').value = fecha.split('T')[0];

  editandoId = id;
}

// 🔹 ELIMINAR
async function eliminar(id) {

  if (!confirm("¿Eliminar?")) return;

  try {
    await fetch(`${API}/mantenimiento/${id}`, {
      method: 'DELETE'
    });

    cargar();

  } catch (error) {
    alert("Error eliminando ❌");
  }
}

// 🔹 LIMPIAR
function limpiar() {
  document.getElementById('habitacion').value = '';
  document.getElementById('descripcion').value = '';
  document.getElementById('encargado').value = '';
  document.getElementById('fecha').value = '';
  editandoId = null;
}

// 🔹 INIT
cargarHabitaciones();
cargar();

</script>

</body>
</html>
