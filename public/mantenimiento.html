<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🛠️ Mantenimiento de la institucion </title>

<style>

/* ================= RESET ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* ================= BODY ================= */
body{
  font-family:Arial,sans-serif;
  min-height:100vh;
  background:
  radial-gradient(circle at top,#00ff6644,#000000 60%),
  linear-gradient(135deg,#050505,#0d5f2a,#000000);
  color:white;
  padding-bottom:40px;
}

/* ================= EFECTOS ================= */
body::before{
  content:"";
  position:fixed;
  width:500px;
  height:500px;
  background:#00ff66;
  filter:blur(180px);
  opacity:0.1;
  top:-150px;
  left:-150px;
  z-index:-1;
}

body::after{
  content:"";
  position:fixed;
  width:400px;
  height:400px;
  background:#7cff00;
  filter:blur(160px);
  opacity:0.08;
  bottom:-120px;
  right:-120px;
  z-index:-1;
}

/* ================= HEADER ================= */
.header{
  background:rgba(10,10,10,0.9);
  border-bottom:1px solid #00ff66;
  padding:20px;
  font-size:28px;
  text-align:center;
  font-weight:bold;
  color:#00ff66;
  text-shadow:0 0 15px #00ff66;
  box-shadow:0 0 20px #00ff6644;
}

/* ================= TOP BAR ================= */
.top-bar{
  display:flex;
  justify-content:space-between;
  padding:20px;
  flex-wrap:wrap;
  gap:10px;
}

/* ================= BOTONES ================= */
button{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  color:black;
  font-weight:bold;
  transition:0.3s;
  box-shadow:0 0 15px #00ff6644;
}

button:hover{
  transform:scale(1.05);
  box-shadow:
  0 0 20px #00ff66,
  0 0 40px #00ff6666;
}

.btn-inicio{
  background:linear-gradient(45deg,#00ff66,#7cff00);
}

.btn-logout{
  background:linear-gradient(45deg,#ff3b3b,#ff0000);
  color:white;
}

.btn-guardar{
  background:linear-gradient(45deg,#00ff66,#7cff00);
}

.btn-editar{
  background:linear-gradient(45deg,#ffae00,#ff7300);
  color:white;
}

.btn-eliminar{
  background:linear-gradient(45deg,#ff3b3b,#ff0000);
  color:white;
}
.btn-ver{
  margin-left:8px;
  background:linear-gradient(45deg,#00ff66,#00c853);
  border:none;
  border-radius:10px;
  padding:6px 10px;
  cursor:pointer;
  font-size:14px;
  color:black;
  font-weight:bold;
  transition:0.3s;
  box-shadow:0 0 10px #00ff6644;
}

.btn-ver:hover{
  transform:scale(1.1);
  box-shadow:
  0 0 15px #00ff66,
  0 0 30px #00ff6666;
}
/* ================= FORM ================= */
.form{
  margin:20px auto;
  width:95%;
  max-width:1200px;
  background:rgba(15,15,15,0.9);
  border:1px solid #00ff66;
  border-radius:20px;
  padding:25px;
  box-shadow:
  0 0 20px #00ff6633;
}

/* ================= INPUTS ================= */
input,
select{
  padding:12px;
  margin:8px;
  border-radius:12px;
  border:1px solid #00ff66;
  background:#111;
  color:white;
  width:180px;
  outline:none;
}

input:focus,
select:focus{
  box-shadow:0 0 10px #00ff66;
}

/* ================= TABLA ================= */
.table-container{
  width:95%;
  margin:auto;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  background:rgba(15,15,15,0.95);
  border-radius:20px;
  overflow:hidden;
  box-shadow:
  0 0 20px #00ff6622;
}

/* ================= TH ================= */
th{
  background:linear-gradient(45deg,#00ff66,#0d5f2a);
  color:black;
  padding:15px;
  font-size:15px;
}

/* ================= TD ================= */
td{
  padding:12px;
  border-bottom:1px solid #222;
  color:#eee;
}

/* ================= HOVER FILAS ================= */
tr:hover{
  background:#111;
}

/* ================= DESCRIPCION ================= */
.descripcion{
  max-width:250px;
}

.desc-contenido{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.desc-texto{
  flex:1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* ================= RESPONSIVE ================= */
@media(max-width:768px){

  .top-bar{
    flex-direction:column;
  }

  input,
  select{
    width:100%;
  }

  .header{
    font-size:22px;
  }

  table{
    font-size:13px;
  }
}

</style>
</head>

<body>

<div class="header">
🛠️ Mantenimiento institucion el rodeo
</div>

<div class="top-bar">

  <button class="btn-inicio" onclick="irInicio()">
    🏠 Inicio
  </button>

  <button class="btn-logout" onclick="logout()">
    🚪 Cerrar sesión
  </button>

</div>

<script>

// 🔥 API DINÁMICA
const API = window.location.origin;

// 🔥 NAVEGACIÓN
function irInicio() {
  window.location.href = "/";
}

function logout() {
  localStorage.removeItem('logueado');
  window.location.href = '/';
}

</script>

<div class="form">

<input type="text"
id="area"
placeholder="Área o lugar">

  <input type="text"
  id="descripcion"
  placeholder="Descripción">

  <input type="text"
  id="encargado"
  placeholder="Encargado">

  <input type="date"
  id="fecha">

  <input type="file"
id="evidencia"
accept="image/*">

input[type="file"]{
  width:100%;
  background:#111;
  color:white;
  padding:10px;
}

  <button class="btn-guardar"
  onclick="guardar()">
    💾 Guardar
  </button>

</div>

<div class="table-container">

<table>

  <thead>
    <tr>
      <th>Área o lugar</th>
      <th>Descripción</th>
      <th>Encargado</th>
      <th>Fecha</th>
      <th>Evidencia</th>
      <th>Acciones</th>
    </tr>
  </thead>

  <tbody id="tabla"></tbody>

</table>

</div>

<script>

let editandoId = null;

// 🔹 FORMATO FECHA
function formatearFecha(fecha) {
  return new Date(fecha).toLocaleDateString();
}

// 🔹 CARGAR
async function cargar() {

  try {

    const res =
    await fetch(`${API}/mantenimiento`);

    const data =
    await res.json();

    data.sort(
      (a,b)=>
      new Date(b.fecha) -
      new Date(a.fecha)
    );

    const tabla =
    document.getElementById('tabla');

    tabla.innerHTML = '';

    if(data.length === 0){

      tabla.innerHTML =
      `<tr>
        <td colspan="5">
          Sin datos
        </td>
      </tr>`;

      return;
    }

    data.forEach(item => {

      const desc =
      (item.descripcion || '')
      .replace(/'/g,"\\'");

      const encargado =
      (item.encargado || '')
      .replace(/'/g,"\\'");

      const fila =
      document.createElement('tr');

      fila.innerHTML = `

  <td>${item.area}</td>

  <td class="descripcion">

    <div class="desc-contenido">

      <span class="desc-texto">
        ${item.descripcion}
      </span>

      <button class="btn-ver"
        onclick="verDescripcion(\`${desc}\`)">
        👁️
      </button>

    </div>

  </td>

  <td>${item.encargado}</td>

  <td>
    ${formatearFecha(item.fecha)}
  </td>

  <td>

    ${
      item.evidencia
      ?
      `<button class="btn-ver"
        onclick="window.open('${item.evidencia}')">
        📷
      </button>`
      :
      'Sin foto'
    }

  </td>

  <td>

    <button class="btn-editar"
      onclick="editar(
        ${item.id},
        '${item.area}',
        '${desc}',
        '${encargado}',
        '${item.fecha}'
      )">
      ✏️
    </button>

    <button class="btn-eliminar"
      onclick="eliminar(${item.id})">
      ❌
    </button>

  </td>
`;
      tabla.appendChild(fila);
    });

  } catch(error){

    alert("❌ Error cargando");

    console.log(error);
  }
}

// 🔹 GUARDAR
async function guardar(){

  const area =
document.getElementById('area').value;

  const descripcion =
  document.getElementById('descripcion').value;

  const encargado =
  document.getElementById('encargado').value;

  const fecha =
  document.getElementById('fecha').value;

  const archivo =
document.getElementById('evidencia').files[0];

let evidencia = '';

if(archivo){

  const formData = new FormData();

  formData.append('file', archivo);

  formData.append(
  'upload_preset',
  'institucion'
);

  const cloudRes =
  await fetch(
      'https://api.cloudinary.com/v1_1/dcyxqnkyv/image/upload',
    {
      method:'POST',
      body:formData
    }
  );

  const cloudData =
  await cloudRes.json();

  evidencia = cloudData.secure_url;
}

  if(
  
    !descripcion ||
    !encargado ||
    !fecha
  ){
    alert("Completa todos los campos");
    return;
  }

  try{

    await fetch(`${API}/mantenimiento`,{

      method:
      editandoId ? 'PUT' : 'POST',

      headers:{
        'Content-Type':'application/json'
      },

     body:JSON.stringify({

  id:editandoId,
  area,
  descripcion,
  encargado,
  fecha,
  evidencia
})
    });

    limpiar();

    cargar();

  }catch(error){

    alert("❌ Error guardando");
  }
}

// 🔹 EDITAR
function editar(
  id,
  area,
  descripcion,
  encargado,
  fecha
){

  document.getElementById('area').value =
  area;

  document.getElementById('descripcion').value =
  descripcion;

  document.getElementById('encargado').value =
  encargado;

  document.getElementById('fecha').value =
  fecha.split('T')[0];

  editandoId = id;
}
// 🔹 ELIMINAR
async function eliminar(id){

  if(!confirm("¿Eliminar?")) return;

  try{

    await fetch(
      `${API}/mantenimiento/${id}`,
      {
        method:'DELETE'
      }
    );

    cargar();

  }catch(error){

    alert("❌ Error eliminando");
  }
}

// 🔹 LIMPIAR
function limpiar(){

  document.getElementById('area').value='';
  document.getElementById('descripcion').value='';
  document.getElementById('encargado').value='';
  document.getElementById('fecha').value='';

  editandoId = null;
}

// 🔹 INIT
cargar();

function verDescripcion(texto){
  alert("📄 Descripción completa:\n\n" + texto);
}

</script>

</body>
</html>
