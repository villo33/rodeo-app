<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🔐 Login Institución El Rodeo</title>

<style>

/* ================= RESET ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* ================= BODY ================= */
body{
  font-family:Arial,sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;

  background:
  radial-gradient(circle at top,#00ff6644,#000000 60%),
  linear-gradient(135deg,#050505,#0d5f2a,#000000);

  color:white;
}

/* ================= EFECTOS ================= */
body::before{
  content:"";
  position:fixed;
  width:500px;
  height:500px;
  background:#00ff66;
  filter:blur(180px);
  opacity:0.12;
  top:-150px;
  left:-150px;
  z-index:-1;
}

body::after{
  content:"";
  position:fixed;
  width:400px;
  height:400px;
  background:#7cff00;
  filter:blur(160px);
  opacity:0.08;
  bottom:-120px;
  right:-120px;
  z-index:-1;
}

/* ================= CARD ================= */
.login-box{
  width:95%;
  max-width:420px;

  background:rgba(10,10,10,0.92);

  border:1px solid #00ff66;

  border-radius:25px;

  padding:40px 30px;

  text-align:center;

  box-shadow:
  0 0 25px #00ff6633,
  0 0 60px #00ff6611;

  backdrop-filter:blur(10px);
}

/* ================= TITULO ================= */
.logo{
  font-size:65px;
  margin-bottom:10px;
}

h1{
  color:#00ff66;
  margin-bottom:10px;
  text-shadow:0 0 15px #00ff66;
}

.sub{
  color:#aaa;
  margin-bottom:35px;
  font-size:15px;
}

/* ================= INPUTS ================= */
.input-group{
  margin-bottom:20px;
}

input{
  width:100%;
  padding:15px;
  border:none;
  outline:none;

  border-radius:15px;

  background:#111;

  color:white;

  border:1px solid #00ff66;

  font-size:15px;

  transition:0.3s;
}

input:focus{
  box-shadow:
  0 0 15px #00ff66;
}

/* ================= BOTON ================= */
button{
  width:100%;
  padding:15px;

  border:none;
  border-radius:15px;

  background:
  linear-gradient(45deg,#00ff66,#7cff00);

  color:black;

  font-size:16px;
  font-weight:bold;

  cursor:pointer;

  transition:0.3s;

  margin-top:10px;

  box-shadow:
  0 0 20px #00ff6644;
}

button:hover{
  transform:scale(1.03);

  box-shadow:
  0 0 25px #00ff66,
  0 0 50px #00ff6644;
}

/* ================= FOOTER ================= */
.footer{
  margin-top:25px;
  color:#777;
  font-size:13px;
}

/* ================= RESPONSIVE ================= */
@media(max-width:500px){

  .login-box{
    padding:30px 20px;
  }

  h1{
    font-size:24px;
  }

}

</style>
</head>

<body>

<div class="login-box">

  <div class="logo">🔐</div>

  <h1>Institución El Rodeo</h1>

  <div class="sub">
    Sistema de acceso institucional
  </div>

  <!-- USUARIO -->
  <div class="input-group">

    <input
      type="text"
      id="usuario"
      placeholder="👤 Usuario">

  </div>

  <!-- PASSWORD -->
  <div class="input-group">

    <input
      type="password"
      id="password"
      placeholder="🔑 Contraseña">

  </div>

  <!-- BOTON -->
  <button onclick="login()">
    🚀 Ingresar al sistema
  </button>

  <div class="footer">
    © Institución El Rodeo
  </div>

</div>

<script>

// 🔐 USUARIOS AUTORIZADOS
const usuarios = [

  "Narly valenzuela",

  "Yerlis",

  "elias"

];

// 🔐 CONTRASEÑA
const passwordCorrecta =
"rodeo1326";

// 🔹 LOGIN
function login(){

  const usuario =
  document.getElementById("usuario")
  .value
  .trim();

  const password =
  document.getElementById("password")
  .value
  .trim();

  // VALIDAR USUARIO
  const existe =
  usuarios.some(
    u => u.toLowerCase() === usuario.toLowerCase()
  );

  // LOGIN CORRECTO
  if(
    existe &&
    password === passwordCorrecta
  ){

    localStorage.setItem(
      "logueado",
      "true"
    );

    localStorage.setItem(
      "usuario",
      usuario
    );

    // REDIRECCION
    window.location.href =
    "/index.html";

  }else{

    alert(
      "❌ Usuario o contraseña incorrectos"
    );
  }
}

// ENTER PARA INGRESAR
document.addEventListener(
  "keydown",
  function(e){

    if(e.key === "Enter"){
      login();
    }

  }
);

</script>

</body>
</html>
